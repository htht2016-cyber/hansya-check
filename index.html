    h+='<div class="ri" onclick="_fi('+idx+')">'+c[N]+'<br><span style="color:#888;font-size:13px">'+c[A]+'</span></div>';
  }
  h+='</div>';
  _add(h,'bot');
}

function _fi(i){
  var c=_D[i];_sel=c;
  _role=c[R]===1?1:0;
  var h='<div class="df">';
  h+='<div class="dl">\u533b\u9662\u540d</div><div class="dv">'+c[N]+'</div>';
  h+='<div class="dl">\u4f4f\u6240</div><div class="dv">\u3012'+c[P]+' \u5927\u962a\u5e9c'+c[A]+'</div>';
  h+='<div class="dl">\u96fb\u8a71</div><div class="dv">'+c[PH]+'</div>';
  h+='<div class="dl">\u9662\u9577\u30fb\u7406\u4e8b\u9577\u540d</div><div class="dv">'+c[DR]+'</div>';
  h+='<div class="dl">\u5f79\u8077\u9078\u629e</div>';
  h+='<div class="rb">';
  h+='<button type="button" id="rb0" class="'+(c[R]!==1?'on':'')+'" onclick="_sr(0)">\u9662\u9577</button>';
  h+='<button type="button" id="rb1" class="'+(c[R]===1?'on':'')+'" onclick="_sr(1)">\u7406\u4e8b\u9577</button>';
  h+='</div>';
  h+='<div class="dl">\u3075\u308a\u304c\u306a (\u30ab\u30ca)</div>';
  h+='<input id="kf" class="ki" type="text" placeholder="\u4f8b: \u30e4\u30de\u30c0 \u30bf\u30ed\u30a6" autocomplete="off">';
  h+='<button type="button" class="bg" onclick="_g()">\u30e1\u30fc\u30eb\u6587\u3092\u4f5c\u6210 &#9654;</button>';
  h+='</div>';
  var m=_add(h,'bot');
  _kr=m.querySelector('#kf');
  _rb=[m.querySelector('#rb0'),m.querySelector('#rb1')];
  if(_kr)setTimeout(function(){_kr.focus();},100);
}

var _rb=[];
function _sr(r){
  _role=r;
  if(_rb[0])_rb[0].className=(r===0?'on':'');
  if(_rb[1])_rb[1].className=(r===1?'on':'');
}

function _g(){
  if(!_sel){_add('\u5148\u306b\u533b\u9662\u3092\u9078\u629e\u3057\u3066\u304f\u3060\u3055\u3044\u3002','bot');return;}
  var kana=_kr?_kr.value.trim():'';
  if(!kana){if(_kr)_kr.focus();_add('\u304b\u306a\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044\u3002','bot');return;}
  var c=_sel;
  var rname=_RN[_role];
  var t='\u53cd\u793e\u30c1\u30a7\u30c3\u30af\u304a\u9858\u3044\u3057\u307e\u3059\u3002\n'
    +'\u533b\u9662\u540d\uff1a'+c[N]+'\n'
    +rname+'\uff1a'+c[DR]+'\uff08'+kana+'\uff09\n'
    +'\u90f5\u4fbf\u756a\u53f7\uff1a\u3012'+c[P]+'\n'
    +'\u4f4f\u6240\uff1a\u5927\u962a\u5e9c'+c[A]+'\n'
    +'\u96fb\u8a71\u756a\u53f7\uff1a'+c[PH]+'\n'
    +'\u696d\u7a2e\uff1a\u6b6f\u79d1\u533b\u9662\n'
    +'\u30a4\u30f3\u30dc\u30a4\u30b9\u7121\u3057\n'
    +'\u5224\u5b9a\u25cb\u306a\u3089\u767b\u9332\u304a\u9858\u3044\u3057\u307e\u3059\n'
    +'\u3088\u308d\u3057\u304f\u304a\u9858\u3044\u3057\u307e\u3059\u3002';
  var esc=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  var ts=JSON.stringify(t);
  var h='<div class="ob">'+esc+'</div>';
  h+='<button type="button" class="bc" onclick="_cp(this,'+ts+')">\u30b3\u30d4\u30fc\u3059\u308b</button>';
  _add(h,'bot');
}

function _cp(btn,t){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(function(){_cd(btn);}).catch(function(){_cf(btn,t);});
  }else{_cf(btn,t);}
}
function _cf(btn,t){
  var ta=document.createElement('textarea');
  ta.value=t;ta.style.cssText='position:fixed;opacity:0;top:0;left:0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');_cd(btn);}catch(e){}
  document.body.removeChild(ta);
}
function _cd(btn){
  btn.textContent='\u2705 \u30b3\u30d4\u30fc\u3057\u307e\u3057\u305f\uff01';
  btn.classList.add('done');
  setTimeout(function(){btn.textContent='\u30b3\u30d4\u30fc\u3059\u308b';btn.classList.remove('done');},2000);
}

window.onload=function(){
  _add('\u3053\u3093\u306b\u3061\u306f\uff01\u533b\u9662\u540d\u307e\u305f\u306f\u5730\u533a\u540d\u3092\u5165\u529b\u3059\u308b\u3068\u691c\u7d22\u3057\u307e\u3059\u3002<div class="hint">\u4f8b\uff1a\u300c\u306a\u304b\u3084\u307e\u300d\u300c\u5927\u962a\u5e02\u300d\u306a\u3069</div>','bot');
  document.getElementById('si').focus();
};
</script>
</body>
</html>
